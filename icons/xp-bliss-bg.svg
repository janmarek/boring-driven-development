<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky: bright XP-style blue. Derived from the Jira primary button
         (#0052cc) but lighter and softer — saturated at the top, fading
         to a near-white pale blue at the horizon. -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#4d8de8"/>
      <stop offset="0.55" stop-color="#88b4f1"/>
      <stop offset="1"    stop-color="#cee0f8"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#fff7c8" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#fde9c4" stop-opacity="0.15"/>
      <stop offset="1"    stop-color="#fde9c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Hills: brand yellow (#e8fa5f) sunlit top, slightly darkened
         olive-yellow at the shaded base. -->
    <linearGradient id="hillBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4dd6b"/>
      <stop offset="1" stop-color="#9ba945"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8fa5f"/>
      <stop offset="1" stop-color="#9eb238"/>
    </linearGradient>
  </defs>

  <!-- Full sky gradient (the SVG owns the sky — covers scene bg) -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Soft warm sun glow toward the top-right -->
  <ellipse cx="1280" cy="200" rx="540" ry="320" fill="url(#sun)"/>

  <!-- Wispy clouds in the upper sky -->
  <g>
    <ellipse cx="240"  cy="160" rx="240" ry="34" fill="url(#cloud)"/>
    <ellipse cx="330"  cy="200" rx="180" ry="26" fill="url(#cloud)"/>
    <ellipse cx="1330" cy="110" rx="280" ry="38" fill="url(#cloud)"/>
    <ellipse cx="1410" cy="150" rx="200" ry="28" fill="url(#cloud)"/>
    <ellipse cx="900"  cy="260" rx="230" ry="32" fill="url(#cloud)"/>
    <ellipse cx="850"  cy="290" rx="160" ry="22" fill="url(#cloud)"/>
    <ellipse cx="540"  cy="340" rx="150" ry="20" fill="url(#cloud)"/>
  </g>

  <!-- Distant rolling hill (paler yellow-olive, behind) -->
  <path d="M0 640
           C 220 600, 480 540, 780 580
           C 1080 615, 1320 540, 1600 580
           L 1600 900 L 0 900 Z"
        fill="url(#hillBg)"/>

  <!-- Foreground rolling hill (the XP-bliss S-curve) -->
  <path d="M0 720
           C 180 660, 340 540, 580 490
           C 820 450, 1080 530, 1320 620
           C 1430 660, 1500 690, 1600 700
           L 1600 900 L 0 900 Z"
        fill="url(#hill)"/>
</svg>
